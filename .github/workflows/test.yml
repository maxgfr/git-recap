name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Shellcheck script.sh
        run: shellcheck script.sh

      - name: Shellcheck test-git-recap.sh
        run: shellcheck test-git-recap.sh

  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        if: runner.os == 'Linux'
        run: sudo apt-get install -y jq

      - name: Make script executable
        run: chmod +x script.sh test-git-recap.sh

      - name: Run tests
        run: bash test-git-recap.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
